# 部署静态网站
name: 生产构建部署至 GitHub Pages

on:
  # 仅在推送到默认分支时运行。
  push:
    branches: [ 'main' ]

  # 这个选项可以使你手动在 Action tab 页面触发工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages。
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发的部署
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 单次部署的工作描述
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 获取仓库名称并写入环境变量
        run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV
        
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      - name: 下载依赖
        run: pnpm install

      - name: 构建生产版本
        run: pnpm run build -- --base '/${{ env.REPOSITORY_NAME }}/'

      - name: 配置页面
        uses: actions/configure-pages@v4

      - name: 上传静态资产
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传打包后的文件夹
          path: './dist'

      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
